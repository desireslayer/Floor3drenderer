<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Floor Plan Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1f1f16; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="ui"><h3>Autonomous Structural Intelligence System</h3><p>Loading model...</p></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x1f1f16); // Set background color to yellow
        document.body.appendChild(renderer.domElement);

        // Add Controls (Mouse drag to rotate, scroll to zoom)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        // Add Lights
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 2. Fetch the Python JSON Output
        fetch('model_data.json')
            .then(response => response.json())
            .then(data => {
                document.querySelector('#ui p').innerText = `Rendered ${data.length} walls.`;
                
                // 3. Build the 3D Walls
                data.forEach(wall => {
                    const startX = wall.start[0];
                    const startZ = wall.start[1]; // Map 2D Y to 3D Z
                    const endX = wall.end[0];
                    const endZ = wall.end[1];
                    const height = wall.height; // 3.0m standard

                    // Calculate Wall Geometry
                    const length = Math.sqrt((endX - startX)**2 + (endZ - startZ)**2);
                    const thickness = wall.type === 'load-bearing' ? 0.3 : 0.15; // Thicker outer walls
                    
                    const geometry = new THREE.BoxGeometry(length, height, thickness);
                    
                    // Color coding based on structural logic
                    const color = wall.type === 'load-bearing' ? 0x8B0000 : 0x808080; // Dark Red vs Gray
                    const material = new THREE.MeshStandardMaterial({ color: color });
                    const mesh = new THREE.Mesh(geometry, material);

                    // Position and Rotate
                    mesh.position.set((startX + endX) / 2, height / 2, (startZ + endZ) / 2);
                    mesh.rotation.y = -Math.atan2(endZ - startZ, endX - startX);
                    
                    scene.add(mesh);
                });

                // Position camera to view the whole plan
                camera.position.set(0, 20, 20);
                controls.target.set(10, 0, 10); // Adjust based on your scale factor
                controls.update();
            });

        // 4. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
